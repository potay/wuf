steps:
  - name: "gcr.io/cloud-builders/docker"
    args:
      - "build"
      - "--build-arg"
      - "NEXT_PUBLIC_VAPID_PUBLIC_KEY=${_VAPID_PUBLIC_KEY}"
      - "-t"
      - "us-central1-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/wuf:$COMMIT_SHA"
      - "."

  - name: "gcr.io/cloud-builders/docker"
    args:
      - "push"
      - "us-central1-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/wuf:$COMMIT_SHA"

  - name: "gcr.io/google.com/cloudsdktool/cloud-sdk"
    entrypoint: "gcloud"
    args:
      - "run"
      - "deploy"
      - "wuf"
      - "--image"
      - "us-central1-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/wuf:$COMMIT_SHA"
      - "--region"
      - "us-central1"
      - "--set-env-vars"
      - "FIREBASE_PROJECT_ID=$PROJECT_ID,VAPID_PRIVATE_KEY=${_VAPID_PRIVATE_KEY},NEXT_PUBLIC_VAPID_PUBLIC_KEY=${_VAPID_PUBLIC_KEY},VAPID_SUBJECT=mailto:me@paulchun.com"
      - "--allow-unauthenticated"
      - "--port"
      - "8080"
      - "--memory"
      - "512Mi"
      - "--min-instances"
      - "0"
      - "--max-instances"
      - "2"

substitutions:
  _VAPID_PUBLIC_KEY: "BBmQ7aCizBLttegsoqoiaeiIjz_2lx7I5nKoC6QBYYJhEyPBA__e3TumEFsL1yXHAVcs27-L-ZlB2NMlO2_Jp_4"
  _VAPID_PRIVATE_KEY: "DMJKPiEd0QhYZCgB69S91ps586Oj7Bdr5e4un6B0-ME"

options:
  logging: CLOUD_LOGGING_ONLY
