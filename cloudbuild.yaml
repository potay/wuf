steps:
  # 1. Validate: lint + typecheck + unit tests
  - name: "node:20-alpine"
    entrypoint: sh
    args:
      - -c
      - "npm ci && npm run lint && npm run typecheck && npm run test:ci"

  # 2. Build Docker image
  - name: "gcr.io/cloud-builders/docker"
    args:
      - "build"
      - "--build-arg"
      - "NEXT_PUBLIC_VAPID_PUBLIC_KEY=${_VAPID_PUBLIC_KEY}"
      - "--build-arg"
      - "NEXT_PUBLIC_FIREBASE_API_KEY=${_FIREBASE_API_KEY}"
      - "--build-arg"
      - "NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN=${_FIREBASE_AUTH_DOMAIN}"
      - "--build-arg"
      - "NEXT_PUBLIC_FIREBASE_PROJECT_ID=$PROJECT_ID"
      - "-t"
      - "us-central1-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/wuf:$COMMIT_SHA"
      - "."

  # 3. Push image to Artifact Registry
  - name: "gcr.io/cloud-builders/docker"
    args:
      - "push"
      - "us-central1-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/wuf:$COMMIT_SHA"

  # 4. Deploy to staging (same image, separate service)
  - name: "gcr.io/google.com/cloudsdktool/cloud-sdk"
    entrypoint: "gcloud"
    args:
      - "run"
      - "deploy"
      - "wuf-staging"
      - "--image"
      - "us-central1-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/wuf:$COMMIT_SHA"
      - "--region"
      - "us-central1"
      - "--set-env-vars"
      - "FIREBASE_PROJECT_ID=$PROJECT_ID,VAPID_PRIVATE_KEY=${_VAPID_PRIVATE_KEY},NEXT_PUBLIC_VAPID_PUBLIC_KEY=${_VAPID_PUBLIC_KEY},VAPID_SUBJECT=mailto:me@paulchun.com,STORAGE_BUCKET=wuf-medical-records,ANTHROPIC_API_KEY=${_ANTHROPIC_API_KEY},GEMINI_API_KEY=${_GEMINI_API_KEY},STRIPE_SECRET_KEY=${_STRIPE_SECRET_KEY},STRIPE_WEBHOOK_SECRET=${_STRIPE_WEBHOOK_SECRET},STRIPE_PRICE_ID=${_STRIPE_PRICE_ID}"
      - "--allow-unauthenticated"
      - "--port"
      - "8080"
      - "--memory"
      - "512Mi"
      - "--min-instances"
      - "0"
      - "--max-instances"
      - "1"

  # 5a. Get staging URL
  - name: "gcr.io/google.com/cloudsdktool/cloud-sdk"
    entrypoint: bash
    args:
      - -c
      - |
        gcloud run services describe wuf-staging \
          --region=us-central1 \
          --format='value(status.url)' > /workspace/staging-url.txt
        echo "Staging URL: $(cat /workspace/staging-url.txt)"

  # 5b. E2E + visual regression tests against staging
  - name: "mcr.microsoft.com/playwright:v1.59.1-noble"
    entrypoint: bash
    args:
      - -c
      - |
        STAGING_URL=$(cat /workspace/staging-url.txt)
        echo "Running E2E tests against: $$STAGING_URL"
        npm ci --ignore-scripts
        E2E_BASE_URL=$$STAGING_URL npx playwright test --reporter=list

  # 6. Deploy to production (only runs if step 5 passed)
  - name: "gcr.io/google.com/cloudsdktool/cloud-sdk"
    entrypoint: "gcloud"
    args:
      - "run"
      - "deploy"
      - "wuf"
      - "--image"
      - "us-central1-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/wuf:$COMMIT_SHA"
      - "--region"
      - "us-central1"
      - "--set-env-vars"
      - "FIREBASE_PROJECT_ID=$PROJECT_ID,VAPID_PRIVATE_KEY=${_VAPID_PRIVATE_KEY},NEXT_PUBLIC_VAPID_PUBLIC_KEY=${_VAPID_PUBLIC_KEY},VAPID_SUBJECT=mailto:me@paulchun.com,STORAGE_BUCKET=wuf-medical-records,ANTHROPIC_API_KEY=${_ANTHROPIC_API_KEY},GEMINI_API_KEY=${_GEMINI_API_KEY},STRIPE_SECRET_KEY=${_STRIPE_SECRET_KEY},STRIPE_WEBHOOK_SECRET=${_STRIPE_WEBHOOK_SECRET},STRIPE_PRICE_ID=${_STRIPE_PRICE_ID}"
      - "--allow-unauthenticated"
      - "--port"
      - "8080"
      - "--memory"
      - "512Mi"
      - "--min-instances"
      - "0"
      - "--max-instances"
      - "2"

